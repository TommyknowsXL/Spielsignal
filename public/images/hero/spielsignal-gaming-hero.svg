<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
  <title id="title">SpielSignal Gaming-Landschaft</title>
  <desc id="desc">Abstrakte futuristische Landschaft mit leuchtendem Horizont, Signalringen und einer PC-Gaming-Station.</desc>
  <defs>
    <linearGradient id="sky" x2="0" y2="1"><stop stop-color="#111b36"/><stop offset=".55" stop-color="#0b1020"/><stop offset="1" stop-color="#060914"/></linearGradient>
    <linearGradient id="ground" x2="1"><stop stop-color="#10182c"/><stop offset=".5" stop-color="#151b2e"/><stop offset="1" stop-color="#080c18"/></linearGradient>
    <radialGradient id="sun"><stop stop-color="#f3f5f7"/><stop offset=".22" stop-color="#3ce6ff"/><stop offset="1" stop-color="#4f7cff" stop-opacity="0"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
