name: Daily Editorial Queue

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-editorial-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Steam-Cache wiederherstellen
        uses: actions/cache@v5
        with:
          path: .cache/steam
          key: steam-provider-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            steam-provider-${{ runner.os }}-

      - name: Tagesqueue erzeugen
        run: npm run editorial:daily
        env:
          STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
          STEAM_SCOUT_ENABLED: "true"
          STEAM_RELEASES_ENABLED: "true"
          STEAM_TOP_SELLERS_ENABLED: "true"
          PUBLIC_STEAM_MOST_PLAYED_ENABLED: "false"

      - name: Tests ausführen
        run: npm test

      - name: Produktions-Build prüfen
        run: npm run build

      - name: Tagesberichte als Artefakt bereitstellen
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: spielsignal-editorial-queue-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            src/data/editorial/latest-queue.json
            src/data/editorial/archive/*.json
            docs/editorial/daily-reports/*.md
