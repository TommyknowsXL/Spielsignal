name: Create Editorial Batch

on:
  workflow_dispatch:
    inputs:
      selection_mode:
        description: "manual oder auto-top"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - auto-top
      candidate_ids:
        description: "Nur bei manual: Candidate IDs, durch Komma getrennt"
        required: false
        default: ""
        type: string
      fallback_to_queue:
        description: "Nach manuellen Candidate IDs auf die uebrige Queue zurueckfallen"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      article_type_default:
        description: "Standardtyp: news-overview, release-check, free-promotion oder guide"
        required: true
        default: "news-overview"
        type: choice
        options:
          - news-overview
          - release-check
          - free-promotion
          - guide
      primary_source_urls:
        description: "Optionale offizielle Primärquellen, kandidatenweise mit Semikolon trennen"
        required: false
        type: string
      editorial_note:
        description: "Allgemeine redaktionelle Notiz für den Lauf"
        required: false
        type: string
      max_articles:
        description: "Maximal erzeugte Artikel"
        required: true
        default: "2"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-editorial-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BRANCH_NAME: editorial-batch/${{ github.run_id }}
      QUEUE_PATH: src/data/editorial/latest-queue.json
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Frische Tagesqueue erzeugen
        run: |
          rm -f "$QUEUE_PATH"
          npm run editorial:daily
        env:
          STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
          STEAM_SCOUT_ENABLED: "true"
          STEAM_RELEASES_ENABLED: "true"
          STEAM_TOP_SELLERS_ENABLED: "true"
          PUBLIC_STEAM_MOST_PLAYED_ENABLED: "false"

      - name: Queue validieren und Batch-Auswahl vorbereiten
        id: queue
        run: npm run editorial:batch-summary -- "$SELECTION_MODE" "$CANDIDATE_IDS" "$MAX_ARTICLES" "$QUEUE_PATH" "$ARTICLE_TYPE_DEFAULT" "$FALLBACK_TO_QUEUE"
        env:
          SELECTION_MODE: ${{ inputs.selection_mode }}
          CANDIDATE_IDS: ${{ inputs.candidate_ids }}
          MAX_ARTICLES: ${{ inputs.max_articles }}
          ARTICLE_TYPE_DEFAULT: ${{ inputs.article_type_default }}
          FALLBACK_TO_QUEUE: ${{ inputs.fallback_to_queue }}

      - name: Batch-Entwürfe erzeugen
        id: batch
        run: npm run editorial:create-batch -- "$CANDIDATE_IDS" "$ARTICLE_TYPE_DEFAULT" "$PRIMARY_SOURCE_URLS" "$EDITORIAL_NOTE" "$MAX_ARTICLES" "$QUEUE_PATH" "$SELECTION_MODE" "$FALLBACK_TO_QUEUE"
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          SELECTION_MODE: ${{ inputs.selection_mode }}
          CANDIDATE_IDS: ${{ inputs.candidate_ids }}
          FALLBACK_TO_QUEUE: ${{ inputs.fallback_to_queue }}
          ARTICLE_TYPE_DEFAULT: ${{ inputs.article_type_default }}
          PRIMARY_SOURCE_URLS: ${{ inputs.primary_source_urls }}
          EDITORIAL_NOTE: ${{ inputs.editorial_note }}
          MAX_ARTICLES: ${{ inputs.max_articles }}
          AI_EDITORIAL_ENABLED: ${{ vars.AI_EDITORIAL_ENABLED || 'false' }}
          AI_EDITORIAL_MODEL: ${{ vars.AI_EDITORIAL_MODEL || 'gpt-5-mini' }}
          AI_EDITORIAL_MAX_ARTICLES: ${{ vars.AI_EDITORIAL_MAX_ARTICLES || '3' }}
          AI_EDITORIAL_MAX_RETRIES: ${{ vars.AI_EDITORIAL_MAX_RETRIES || '3' }}
          AI_EDITORIAL_FAIL_WITHOUT_QUOTA: ${{ vars.AI_EDITORIAL_FAIL_WITHOUT_QUOTA || 'true' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Tests ausführen
        run: npm test

      - name: Produktions-Build prüfen
        run: npm run build

      - name: Veröffentlichungsfähigkeit zusammenfassen
        if: always()
        env:
          COMPLETE_DRAFTS: ${{ steps.batch.outputs.completeDrafts }}
          REJECTED_CANDIDATES: ${{ steps.batch.outputs.rejectedCandidates }}
          ARTICLE_PATHS: ${{ steps.batch.outputs.articlePaths }}
          HERO_IMAGE_STATUSES: ${{ steps.batch.outputs.heroImageStatuses }}
          MANUAL_REVIEW_POINTS: ${{ steps.batch.outputs.manualReviewPoints }}
          QUEUE_HASH: ${{ steps.batch.outputs.queueHash }}
          QUEUE_GENERATED_AT: ${{ steps.batch.outputs.queueGeneratedAt }}
          QUEUE_CANDIDATE_COUNT: ${{ steps.batch.outputs.queueCandidateCount }}
          AI_CALLS_ATTEMPTED: ${{ steps.batch.outputs.aiCallsAttempted }}
          AI_CALLS_SUCCESSFUL: ${{ steps.batch.outputs.aiCallsSuccessful }}
          AI_CALLS_FAILED: ${{ steps.batch.outputs.aiCallsFailed }}
          AI_STATUS: ${{ steps.batch.outputs.aiStatus }}
        run: |
          {
            echo "## Editorial Batch"
            echo
            echo "- Vollständige Entwürfe: ${COMPLETE_DRAFTS:-0}"
            echo "- Abgelehnte Kandidaten: ${REJECTED_CANDIDATES:-0}"
            echo "- Queue-Kandidaten gesamt: ${QUEUE_CANDIDATE_COUNT:-0}"
            echo "- Queue-Erstellungszeit: ${QUEUE_GENERATED_AT:-unbekannt}"
            echo "- Queue-Hash: ${QUEUE_HASH:-unbekannt}"
            echo "- KI-Aufrufe versucht: ${AI_CALLS_ATTEMPTED:-0}"
            echo "- KI-Aufrufe erfolgreich: ${AI_CALLS_SUCCESSFUL:-0}"
            echo "- KI-Aufrufe fehlgeschlagen: ${AI_CALLS_FAILED:-0}"
            echo "- KI-Status: ${AI_STATUS:-nicht ausgewertet}"
            echo "- Artikelpfade: ${ARTICLE_PATHS:-keine}"
            echo "- Hero-Bildstatus: ${HERO_IMAGE_STATUSES:-keine vollständigen Entwürfe}"
            echo "- Manuelle Prüfpunkte: ${MANUAL_REVIEW_POINTS:-keine}"
            echo "- Artifact: nur für technische Diagnose erforderlich"
            echo
            if [ "${COMPLETE_DRAFTS:-0}" = "0" ]; then
              echo "## Batch nicht veröffentlichungsfähig"
              echo
              echo "Keine vollstaendigen Artikel erzeugt. Details stehen im Batch-Report."
              echo "Die Gerüste dienen ausschließlich der Diagnose und dürfen nicht veröffentlicht werden."
            else
              echo "Im Normalbetrieb genügt der Pull Request."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Branch und Commit erstellen
        if: steps.batch.outputs.completeDrafts != '0'
        env:
          BRANCH_NAME: ${{ steps.batch.outputs.branchName }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
            echo "Branch existiert bereits: $BRANCH_NAME" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add docs/editorial/batch-reports
          for draft in src/content/drafts/*.md; do
            [ -e "$draft" ] || continue
            if grep -q '^status: "draft"$' "$draft"; then
              git add "$draft"
            fi
          done
          git commit -m "content: add editorial batch ${{ github.run_id }}"
          git push --set-upstream origin "$BRANCH_NAME"

      - name: Pull Request erstellen
        if: steps.batch.outputs.completeDrafts != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.batch.outputs.branchName }}
          REPORT_PATH: ${{ steps.batch.outputs.reportPath }}
          REPORT_DATE: ${{ steps.batch.outputs.reportDate }}
          COMPLETE_DRAFTS: ${{ steps.batch.outputs.completeDrafts }}
          ARTICLE_PATHS: ${{ steps.batch.outputs.articlePaths }}
          PREVIEW_PATHS: ${{ steps.batch.outputs.previewPaths }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Editorial Batch: $REPORT_DATE · $COMPLETE_DRAFTS vollständige Entwürfe" \
            --body-file "$REPORT_PATH")
          {
            echo
            echo "## Pull Request und Vorschau"
            echo
            echo "- PR: $PR_URL"
            echo "- Artikelpfade: ${ARTICLE_PATHS:-keine}"
            echo "- Preview-Pfade: ${PREVIEW_PATHS:-keine}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Batch-Diagnose als Artefakt bereitstellen
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: spielsignal-editorial-batch-diagnostics
          if-no-files-found: warn
          retention-days: 30
          path: |
            src/data/editorial/latest-queue.json
            docs/editorial/daily-reports/
            docs/editorial/batch-reports/
            src/content/drafts/
